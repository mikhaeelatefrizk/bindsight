# bindsight held-out benchmark config.
#
# Runs the full pipeline over a REAL tumor-vs-normal cohort so its candidate
# shortlist can be scored against the held-out known-antigen set
# (`benchmarks/known.tsv`) with `bindsight benchmark`. Used in two ways:
#
#   1. Designer benchmark (docs/use-cases.md case 2): run this config once per
#      designer with identical upstream inputs, then compare:
#         for d in rfdiff_mpnn bindcraft boltzgen; do
#           bindsight run examples/benchmark_held_out.yaml --designer "$d" \
#             --out runs/bench_$d
#         done
#         bindsight benchmark runs/bench_*/ \
#           --known-antigens benchmarks/known.tsv --out benchmark_report.html
#
#   2. Rediscovery check: a single `bindsight run` then `bindsight benchmark`.
#
# This cohort is TCGA-BRCA (breast). `bindsight discover` auto-downloads the
# real STAR-Counts matrix from NIH/GDC into the cache on first run, so the
# expected rediscovery is HER2 (ERBB2) and EGFR near the top of the shortlist.
# To benchmark the AML antigens (CD33/CD123) instead, point `inputs` at an
# AML-vs-normal cohort (e.g. TCGA-LAML tumor vs. GTEx whole-blood normal).

name: bindsight_benchmark_held_out
out_dir: runs/benchmark_held_out

inputs:
  # Auto-downloaded by `bindsight discover` if absent (see bindsight/io/gdc.py).
  counts: data/gdc_cache/tcga_brca/counts.tsv.gz
  design: data/gdc_cache/tcga_brca/design.tsv

params:
  deg:
    design_formula: "~ condition"
    contrast: ["condition", "tumor", "normal"]
    fdr_threshold: 0.05
    log2fc_threshold: 1.0
    min_replicates: 3

  target_discovery:
    require_surfy: true
    surfy_allow_offline_fallback: false   # production: fail fast if SURFY isn't cached
    vital_tissues:
      - heart_left_ventricle
      - brain_cortex
      - liver
      - lung
    vital_tissue_max_tpm: 5.0
    use_open_targets: true
    require_tractable_modality: ["Antibody"]
    max_safety_events: 5
    require_surface_bind_site: false
    top_n: 20                              # wide enough to score recall@20

  design:
    designer: rfdiff_mpnn
    n_trajectories: 50
    binder_length_min: 50
    binder_length_max: 100
    seed: 42

  validate:
    validator: boltz2
    iptm_threshold: 0.65
    pae_interaction_threshold: 8.0

  rank:
    weights:
      log2fc_specificity: 0.25
      iptm: 0.30
      affinity: 0.30
      sequence_recovery: 0.15

backend: modal
cheap_profile: false
