# bindsight demo config — runs the discovery half on a REAL TCGA breast-cancer
# cohort (NIH/GDC). It discovers cell-surface, antibody-tractable antigens that
# are over-expressed in tumor vs. adjacent normal, ranked with full provenance.
# Well-known breast-cancer surface antigens (e.g. ERBB2/HER2) surface among the
# candidates when their signal is present in the sampled cohort; EGFR is often
# lower in bulk tumor than in normal breast epithelium, so it may rank as a
# down-regulated DEG rather than a top up-regulated target — that's the real
# biology, not a scripted result.
#
# On first run, `bindsight discover`/`demo` auto-downloads the cohort (STAR -
# Counts) from the GDC open-access API into the cache below, populates the full
# SURFY surfaceome list, and enriches the top up-regulated DEGs via Open
# Targets; subsequent runs are cached. Needs network the first time; takes a few
# minutes (real DESeq2 + enrichment on real data), not 30 seconds.

name: bindsight_demo_tcga_brca
out_dir: runs/demo

inputs:
  # Auto-downloaded from GDC if absent (see bindsight/io/gdc.py). Cached here.
  counts: data/gdc_cache/tcga_brca/counts.tsv.gz
  design: data/gdc_cache/tcga_brca/design.tsv
  download:
    project: TCGA-BRCA
    n_tumor: 20
    n_normal: 20
    gene_types: ["protein_coding"]

params:
  deg:
    design_formula: "~ condition"
    contrast: ["condition", "tumor", "normal"]
    fdr_threshold: 0.05
    log2fc_threshold: 1.0
    min_replicates: 3
    min_count: 10

  target_discovery:
    require_surfy: true
    surfy_allow_offline_fallback: true   # attempt full SURFY; fall back if offline
    use_open_targets: true               # genuine discovery across the surfaceome
    require_tractable_modality: []       # don't pre-filter modality in the demo
    max_safety_events: 100
    require_surface_bind_site: false
    top_n: 10

backend: colab
cheap_profile: false
