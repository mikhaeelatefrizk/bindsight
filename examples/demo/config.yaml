# xpr2bind demo config — runs end-to-end on a tiny synthetic 10-gene cohort
# in ~30 seconds on a CPU laptop. Used by `xpr2bind demo`.
#
# Storyline: the cohort is "tumor" (n=4) vs. "normal" (n=4). The tumor samples
# are designed to over-express HER2 (ERBB2), EGFR, ESR1, KRAS, HRAS — all
# real human surface or driver proteins. The pipeline should rediscover HER2
# and EGFR as the top antibody-tractable surface antigens.

name: xpr2bind_demo
out_dir: runs/demo

inputs:
  counts: examples/demo/counts.tsv
  design: examples/demo/design.tsv

params:
  deg:
    design_formula: "~ condition"
    contrast: ["condition", "tumor", "normal"]
    fdr_threshold: 0.05
    log2fc_threshold: 1.0
    min_replicates: 2
    min_count: 0

  target_discovery:
    require_surfy: true
    surfy_allow_offline_fallback: true   # demo runs even if cache isn't populated
    use_open_targets: false              # demo is offline-safe
    require_tractable_modality: []
    max_safety_events: 100
    require_surface_bind_site: false
    top_n: 5

backend: colab
cheap_profile: false
