# Example bindsight config: TCGA-LUAD (lung adenocarcinoma) primary tumor vs.
# adjacent solid normal, from NIH/GDC (STAR - Counts).
#
# Canonical full-pipeline example. On first run, `bindsight discover` (or
# `bindsight run`) auto-downloads the cohort from the GDC open-access API into
# the cache below (then it's offline). EGFR — a known LUAD target — is expected
# among the differentially-expressed surface antigens.

name: tcga_luad_v01
out_dir: runs/tcga_luad_v01

# ---------------------------------------------------------------------------
# Inputs
# ---------------------------------------------------------------------------
inputs:
  # Auto-downloaded from NIH/GDC if absent (see bindsight/io/gdc.py); cached here.
  counts: data/gdc_cache/tcga_luad/counts.tsv.gz
  design: data/gdc_cache/tcga_luad/design.tsv
  download:
    project: TCGA-LUAD
    n_tumor: 40
    n_normal: 40
    gene_types: ["protein_coding"]

# ---------------------------------------------------------------------------
# Stage parameters
# ---------------------------------------------------------------------------
params:
  deg:
    design_formula: "~ condition"
    contrast: ["condition", "tumor", "normal"]
    fdr_threshold: 0.05
    log2fc_threshold: 1.0
    min_replicates: 3

  target_discovery:
    # Surfaceome filter (the full SURFY list auto-populates on first use).
    require_surfy: true
    surfy_allow_offline_fallback: false  # production: fail fast if SURFY can't be fetched

    # Specificity baseline (vital-tissue expression).
    vital_tissues:
      - heart_left_ventricle
      - brain_cortex
      - liver
      - lung
    vital_tissue_max_tpm: 5.0

    # Tractability + safety from Open Targets.
    use_open_targets: true
    require_tractable_modality: ["Antibody"]
    max_safety_events: 5

    # SURFACE-Bind targetable-site filtering is a roadmap item; until then the
    # design step targets the whole surface, so leave this off.
    require_surface_bind_site: false

    # Top-N targets carried forward to design.
    top_n: 5

  design:
    designer: rfdiff_mpnn
    n_trajectories: 50
    binder_length_min: 50
    binder_length_max: 100
    seed: 42

  validate:
    validator: boltz2
    iptm_threshold: 0.65
    pae_interaction_threshold: 8.0

  rank:
    weights:
      log2fc_specificity: 0.25
      iptm: 0.30
      affinity: 0.30
      sequence_recovery: 0.15

# ---------------------------------------------------------------------------
# Runtime
# ---------------------------------------------------------------------------
backend: modal          # GPU backend: colab | modal | kaggle | local_docker | mock
cheap_profile: false    # If true, drops to T4 / fewer trajectories
