name: bindsight-discover
channels:
  - conda-forge
  - bioconda
dependencies:
  # Python core
  - python=3.11
  - pip>=24.0
  # CLI + config
  - click>=8.1
  - rich>=13.7
  - pyyaml>=6.0
  - tenacity>=8.4
  # Data layer
  - pandas>=2.2
  - pyarrow>=16
  - numpy>=1.26
  # DEG (default backend)
  - pydeseq2>=0.5
  # Bio I/O
  - biopython>=1.83
  # Provenance / validation
  - pydantic>=2.6
  - pydantic-settings>=2.2
  # HTTP / GraphQL
  - requests>=2.32
  - urllib3>=2.0
  - platformdirs>=4.2
  # Workflow
  - snakemake-minimal>=8.0
  # Pip-only dependencies
  - pip:
      - gql[requests]>=3.5
      - -e ..
