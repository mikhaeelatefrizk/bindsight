name: Keep demo warm (redundant)

# Belt-and-suspenders companion to keep-warm.yml.
#
# GitHub Actions scheduled workflows have a known long tail of skips and
# late-firing runs during peak periods — multiple posts in
# github.com/orgs/community/discussions/53658 report cron skips of 20+
# minutes routinely, occasional hour+ gaps.  A SINGLE hourly cron is
# almost always enough for the 48 h HF sleep threshold, but stacking a
# second workflow at minute 30 closes any single-run skip gap, and
# defining it in a separate file means a YAML / syntax bug in one
# doesn't take both out.
#
# This workflow does ONLY the lightweight ping; the deeper HF API stage
# check + Streamlit Cloud probe live in keep-warm.yml and run on minute
# 0.  Belt-and-suspenders, not duplicate-everything.

on:
  schedule:
    - cron: '30 * * * *'   # offset 30 min from keep-warm.yml's :00 run
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  ping:
    name: Lightweight ping to refuse HF sleep
    runs-on: ubuntu-latest
    # Pure best-effort keepalive — it has no monitoring value (that lives in
    # keep-warm.yml), so it must never be able to fail the run / email.
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - name: Visit HF Space UI
        env:
          UI_URL: https://huggingface.co/spaces/Mikhaeelatefrizk/bindsight
          APP_URL: https://mikhaeelatefrizk-bindsight.hf.space
        run: |
          set -uo pipefail
          # Two GETs: the UI URL (resets the HF inactivity timer on the
          # Space's runtime) and the app URL (resets activity on the
          # actual Streamlit container).
          #
          # NOTE: no `set -e`, and every curl ends in `|| true`. A failed
          # ping here is meaningless — the previous iteration let a single
          # transient `curl: exit 23` (write error on /dev/null) abort the
          # whole job and email a false alarm. The ping is fire-and-forget;
          # we record the HTTP code (or a marker on curl error) and move on.
          for url in "${UI_URL}" "${APP_URL}/"; do
            code=$(curl -sSL --max-time 60 --retry 2 --retry-delay 20 \
                        -o /dev/null -w "%{http_code}" \
                        -A 'bindsight-keep-warm-redundant/1' \
                        "${url}" || true)
            echo "${url} -> HTTP ${code:-<curl-error>}"
          done
          exit 0
