name: Keep Streamlit demo warm

# Streamlit Community Cloud auto-sleeps apps after a few days of inactivity.
# Once asleep, the next visitor sees a "Zzzz" page and waits 60-120 s for the
# container to rebuild — a bad first impression for cold-outreach traffic
# from academic PIs.  This workflow originally pinged the URL every 6 hours
# from GitHub's scheduler.
#
# **Schedule disabled 2026-05-15.**  GitHub Actions on this account is
# currently blocked by an upstream billing-config issue (the cron-triggered
# runs were failing with "Actions blocked by billing issue", which generated
# email noise without doing useful work).  The workflow is left in the repo
# as documentation + manual-trigger fallback (workflow_dispatch).
#
# Since the cron is off, the durable demo URL going forward is the
# **Hugging Face Space mirror**: https://huggingface.co/spaces/Mikhaeelatefrizk/bindsight
# (16 GB CPU, no auto-sleep).  The Streamlit demo will still respond
# whenever someone visits but may show a 60–120 s wake-up screen on first
# hit after several days of inactivity.

on:
  workflow_dispatch:  # manual triggering only — schedule disabled (see header)

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping the live Streamlit demo
        run: |
          set -euo pipefail
          URL="https://bindsight.streamlit.app/"
          echo "Pinging $URL to keep Streamlit Community Cloud container warm…"
          # -s silent, -L follow redirects, --max-time 120 s (wake-up can be slow),
          # --retry 2 with 30 s backoff in case the first hit lands on a cold
          # container that's still booting.  We only care that the URL responds;
          # we don't care about the body.
          HTTP_CODE=$(curl -sL --max-redirs 100 --max-time 120 \
                          --retry 2 --retry-delay 30 \
                          -o /dev/null -w "%{http_code}" "$URL")
          echo "HTTP $HTTP_CODE"
          # Treat any 2xx/3xx as success.  Streamlit's wake-up page returns 200
          # even when the underlying app is still booting, which is what we want.
          if [[ "$HTTP_CODE" =~ ^[23][0-9][0-9]$ ]]; then
            echo "Demo is reachable."
          else
            echo "Demo returned unexpected status $HTTP_CODE" >&2
            exit 1
          fi
